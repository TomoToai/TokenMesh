apiVersion: v1
kind: Secret
metadata:
  name: tokenmesh-secrets
  namespace: tokenmesh
type: Opaque
stringData:
  ARK_API_KEY: "replace-with-ark-api-key"
  ARK_BASE_URL: "https://ark.cn-beijing.volces.com/api/v3"
  VOLC_REGION: "cn-beijing"
  DEEPSEEK_API_KEY: "replace-with-deepseek-api-key"
  DEEPSEEK_BASE_URL: "https://api.deepseek.com"
  VOLCENGINE_WEB_SEARCH_API_KEY: "replace-with-volcengine-web-search-api-key"
  VOLCENGINE_WEB_SEARCH_BASE_URL: "https://open.feedcoopapi.com/search_api/web_search"
  JWT_SECRET: "replace-with-strong-random-secret"
